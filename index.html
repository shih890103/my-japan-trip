<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 JP Travel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --pink: #F2CFD7; --blue: #D6E6E5; --green: #D1D171; --yellow: #FEE088;
        }
        body { background-color: #FFFDF9; font-family: -apple-system, "Noto Sans TC", sans-serif; }
        .neo-card { border: 3px solid #333; box-shadow: 6px 6px 0px var(--pink); background: white; border-radius: 15px; margin-bottom: 24px; position: relative; }
        /* 日期選單明顯邊框 */
        .day-btn { border: 3px solid #333; transition: 0.2s; background: white; }
        .day-btn-active { background-color: var(--pink) !important; transform: scale(1.05); }
        /* 左側縱向直線 */
        .timeline-line { position: absolute; left: 24px; top: 0; bottom: 0; width: 4px; background-color: var(--blue); z-index: 0; }
        .time-tag { background: var(--green); color: #333; padding: 2px 8px; border: 2px solid #333; font-weight: 900; border-radius: 8px; margin-right: 12px; z-index: 10; position: relative; min-width: 65px; text-align: center; }
        .nav-link { background: var(--yellow); color: #333; padding: 10px; border-radius: 12px; font-weight: 900; text-align: center; display: block; margin-top: 10px; border: 2px solid #333; font-size: 13px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* 記帳 Modal */
        #ledger-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    </style>
</head>
<body class="pb-24">

    <div class="sticky top-0 bg-white border-b-4 border-[#333] z-50 p-4 shadow-sm">
        <div class="flex overflow-x-auto gap-4 no-scrollbar py-2" id="day-selector"></div>
        <div class="mt-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-gray-800" id="display-date">DAY 1</h1>
            <div id="weather-tag" class="bg-[var(--yellow)] border-2 border-[#333] px-3 py-1 rounded-full font-bold text-sm text-gray-700">☀️ 12°C</div>
        </div>
    </div>

    <div class="p-6 relative">
        <div class="timeline-line"></div>
        <div id="timeline-container" class="space-y-6 relative"></div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t-4 border-[#333] p-4 flex justify-around items-center z-50">
        <button onclick="scrollToTop()" class="font-black text-gray-700">行程</button>
        <button onclick="calculateRate()" class="w-14 h-14 bg-[var(--yellow)] border-4 border-[#333] text-gray-700 rounded-full flex items-center justify-center text-2xl font-black shadow-[4px_4px_0px_#333]">¥</button>
        <button onclick="toggleLedger()" class="w-14 h-14 bg-[var(--pink)] border-4 border-[#333] text-gray-700 rounded-full flex items-center justify-center text-2xl font-black shadow-[4px_4px_0px_#333]">💰</button>
    </div>

    <div id="ledger-modal" onclick="if(event.target==this)toggleLedger()">
        <div class="bg-white border-4 border-[#333] p-6 rounded-3xl w-[90%] max-w-md shadow-[8px_8px_0px_#333]">
            <h2 class="text-xl font-black mb-4">💰 彈性分帳記帳</h2>
            <input id="exp-amt" type="number" placeholder="輸入日幣金額 JPY" class="w-full border-2 border-[#333] p-3 rounded-xl mb-4 font-bold">
            <p class="font-black mb-2 text-sm text-gray-500">選擇分帳人數：</p>
            <div class="flex gap-2 mb-6">
                <button onclick="setSplit(1)" class="split-btn flex-1 border-2 border-[#333] py-2 rounded-lg font-black" id="sb1">1人</button>
                <button onclick="setSplit(2)" class="split-btn flex-1 border-2 border-[#333] py-2 rounded-lg font-black" id="sb2">2人</button>
                <button onclick="setSplit(3)" class="split-btn flex-1 border-2 border-[#333] py-2 rounded-lg font-black" id="sb3">3人</button>
                <button onclick="setSplit(4)" class="split-btn flex-1 border-2 border-[#333] py-2 rounded-lg font-black" id="sb4">4人</button>
            </div>
            <button onclick="saveExp()" class="w-full bg-[var(--green)] border-2 border-[#333] py-3 rounded-xl font-black text-lg">記錄支出</button>
            <div id="exp-list" class="mt-6 max-h-40 overflow-y-auto border-t-2 border-dashed pt-4"></div>
        </div>
    </div>

    <script>
        const weatherData = { 1:"☀️ 12°C", 2:"☁️ 10°C", 3:"🌤️ 8°C", 4:"☀️ 11°C", 5:"🌧️ 9°C", 6:"🌤️ 12°C" };
        const travelData = {
            1: { date: "3/6 (五)", title: "抵達京都", items: [
                { t: "07:00", l: "桃園機場 T1 集合", d: "航班 MM024 (09:40-13:10)", links: [{n: "✈️ MM024 航班實時動態", u: "https://www.trip.com/webapp/flight/schedule/detail.html?flightNo=MM024"}] },
                { t: "13:10", l: "抵達關西 T2", d: "接駁車往 T1 轉乘 JR", links: [] },
                { t: "14:44", l: "JR HARUKA", d: "往京都車站 (16:04抵達)", links: [
                    {n: "📖 Haruka 介紹", u: "https://www.westjr.co.jp/global/tc/travel/shopping/access/train.html"},
                    {n: "🛒 Klook 訂購 ($424)", u: "https://s.klook.com/c/my45rLeWwO"}
                ]},
                { t: "16:45", l: "晚餐選項 (點擊導航)", d: "包含燒肉、居酒屋、拉麵", links: [
                    {n: "🥩 1. 京的燒肉處 弘", u: "https://maps.app.goo.gl/htujbBKAAdkCHFDt8?g_st=ipc"},
                    {n: "🍜 2. 拉麵小路", u: "https://maps.app.goo.gl/FGw9BVes7NiHvedF6?g_st=ipc"},
                    {n: "🥢 3. 拉麵 Kitada", u: "https://maps.app.goo.gl/Wa2wSsbMJ3FyQmHw9?g_st=ipc"}
                ]}
            ]},
            2: { date: "3/7 (六)", title: "清水寺和服", items: [
                { t: "09:00", l: "璃光和服 祇園店", d: "和服體驗與清水寺散策", links: [{n: "📍 璃光和服地圖", u: "https://maps.app.goo.gl/D5QwiTvcQ6ojXG227?g_st=ipc"}] },
                { t: "16:00", l: "百貨逛街攻略 (點擊導航)", d: "永旺/Porta/伊勢丹/Avanti", links: [
                    {n: "🏬 1. 永旺百貨 (大創/UNIQLO)", u: "https://maps.app.goo.gl/XLuaWAbnVcCAa4UN6?g_st=ipc"},
                    {n: "🏬 2. 京都 Porta", u: "https://maps.app.goo.gl/RomrA1h6zyL7KHBb8?g_st=ipc"},
                    {n: "🏬 3. 京都 Avanti", u: "https://maps.app.goo.gl/Jw9C1PZkPN9nJ4eJ6?g_st=ipc"}
                ]}
            ]},
            4: { date: "3/9 (一)", title: "環球 25週年特別版", items: [
                { t: "07:00", l: "抵達影城大門口", d: "提早兩小時排隊", links: [] },
                { t: "07:45", l: "提早開園/入園搶券", d: "領取「超級任天堂世界」整理券", links: [] },
                { t: "13:00", l: "25週年特別遊行", d: "觀賞「NO LIMIT! Parade」(25隻皮卡丘！)", links: [] },
                { t: "14:30", l: "Cool Japan 活動", d: "咒術迴戰 4D / 名偵探柯南", links: [] }
            ]},
            6: { date: "3/11 (三)", title: "準備回台", items: [
                { t: "08:00", l: "南海難波站", d: "搭乘 Rapi:t 前往關西機場", links: [] },
                { t: "09:30", l: "關西機場 T1", d: "航班 MM023 (11:30-13:50)", links: [{n: "🛍️ KIX 免稅店預訂", u: "https://www.kixdutyfree.jp/tw/"}] }
            ]}
        };

        let currentSplit = 1;
        function setSplit(n) {
            currentSplit = n;
            document.querySelectorAll('.split-btn').forEach(b => b.style.background = 'white');
            document.getElementById('sb'+n).style.background = 'var(--yellow)';
        }

        function initButtons() {
            const selector = document.getElementById('day-selector');
            for (let i = 1; i <= 6; i++) {
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 w-20 h-24 flex flex-col items-center justify-center rounded-2xl day-btn font-black`;
                btn.id = `btn-day-${i}`;
                btn.onclick = () => showDay(i);
                btn.innerHTML = `<span class="text-xs text-gray-500">D${i}</span><span class="text-lg">03/${5+i}</span>`;
                selector.appendChild(btn);
            }
            showDay(1);
        }

        function showDay(dayNum) {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('day-btn-active'));
            document.getElementById(`btn-day-${dayNum}`).classList.add('day-btn-active');
            document.getElementById('weather-tag').innerText = weatherData[dayNum] || "☀️ 12°C";
            const data = travelData[dayNum] || { title: "行程規劃中", items: [] };
            document.getElementById('display-date').innerText = `DAY ${dayNum} ${data.title}`;
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';
            data.items.forEach((item, idx) => {
                const card = `
                    <div class="flex items-start">
                        <span class="time-tag">${item.t}</span>
                        <div class="neo-card flex-1 p-4" onclick="toggleDetail('d-${dayNum}-${idx}')">
                            <h2 class="text-md font-black">${item.l}</h2>
                            <p class="text-xs font-bold text-gray-400 mt-1">✦ ${item.d}</p>
                            <div id="d-${dayNum}-${idx}" class="${item.links && item.links.length > 0 ? '' : 'hidden'} mt-4">
                                ${item.links ? item.links.map(l => `<a href="${l.u}" target="_blank" class="nav-link" onclick="event.stopPropagation()">🔗 ${l.n}</a>`).join('') : ''}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function toggleLedger() { const m = document.getElementById('ledger-modal'); m.style.display = (m.style.display=='flex'?'none':'flex'); renderExp(); }
        function saveExp() {
            const amt = document.getElementById('exp-amt').value;
            if(!amt) return;
            const list = JSON.parse(localStorage.getItem('jptrip_exp') || '[]');
            list.push({ amt, split: currentSplit, per: Math.round(amt/currentSplit) });
            localStorage.setItem('jptrip_exp', JSON.stringify(list));
            document.getElementById('exp-amt').value = '';
            renderExp();
        }
        function renderExp() {
            const list = JSON.parse(localStorage.getItem('jptrip_exp') || '[]');
            document.getElementById('exp-list').innerHTML = list.reverse().map(i => `<div class="text-sm font-bold mb-2 border-b pb-1">¥${i.amt} / ${i.split}人 = <span class="text-pink-500">每人 ¥${i.per}</span></div>`).join('');
        }
        function toggleDetail(id) { document.getElementById(id).classList.toggle('hidden'); }
        function calculateRate() { const j = prompt("日幣 (JPY):", "1000"); if(j) alert(`¥${j} ≈ $${Math.round(j*0.21)}`); }
        function scrollToTop() { window.scrollTo({top: 0, behavior: 'smooth'}); }
        window.onload = initButtons;
    </script>
</body>
</html>
