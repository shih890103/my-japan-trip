<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 JP Travel Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --purple: #b594d0; --orchid: #d176ac; --lemon: #f9de90; 
            --peach: #f8c6a1; --petal: #f5dde3; 
        }
        body { background-color: var(--petal); font-family: -apple-system, "Noto Sans TC", sans-serif; color: #444; overflow-x: hidden; }
        
        /* 頂部日期導覽放大 */
        .day-btn { border: 3px solid #333; background: white; min-width: 90px; border-radius: 18px; transition: 0.2s; }
        .day-btn-active { background-color: var(--orchid) !important; color: white; transform: translateY(-3px); box-shadow: 0px 4px 0px #333; }
        .day-label { font-size: 14px; font-weight: 900; }
        .date-label { font-size: 19px; font-weight: 900; }

        /* 時間軸佈局：左側縱線與時間標籤 */
        .timeline-container { position: relative; padding-left: 95px; } 
        .timeline-line { position: absolute; left: 45px; top: 0; bottom: 0; width: 5px; background-color: var(--purple); z-index: 0; border-left: 2px solid #333; }
        
        .time-tag { 
            position: absolute; left: -95px; top: 15px;
            background: var(--peach); color: #333; padding: 5px 12px; border: 3px solid #333; 
            font-weight: 900; border-radius: 12px; z-index: 10; font-size: 15px;
            width: 85px; text-align: center; box-shadow: 3px 3px 0px #333;
        }

        .neo-card { border: 3px solid #333; box-shadow: 5px 5px 0px var(--orchid); background: white; border-radius: 18px; margin-bottom: 25px; transition: 0.3s; cursor: pointer; width: 100%; }
        .nav-link { background: var(--lemon); color: #333; padding: 10px; border-radius: 12px; font-weight: 900; text-align: center; display: block; margin-top: 10px; border: 2px solid #333; font-size: 13px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
        .hidden-detail { display: none; }
        .bottom-btn { width: 58px; height: 58px; border: 3px solid #333; border-radius: 50%; display: flex; items-center; justify-content: center; font-size: 24px; box-shadow: 4px 4px 0px #333; }
    </style>
</head>
<body class="pb-32">

    <div class="sticky top-0 bg-white border-b-4 border-[#333] z-50 p-4">
        <div class="flex overflow-x-auto gap-4 no-scrollbar py-2" id="day-selector"></div>
        <div class="mt-4 flex justify-between items-center px-2">
            <h1 class="text-2xl font-black" id="display-date">DAY 1</h1>
            <div id="weather-tag" class="bg-[var(--lemon)] border-2 border-[#333] px-3 py-1 rounded-full font-bold text-sm">🌸 Spring 2026</div>
        </div>
    </div>

    <div class="p-6">
        <div class="timeline-container">
            <div class="timeline-line"></div>
            <div id="timeline-items" class="space-y-12"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t-4 border-[#333] p-4 flex justify-around items-center z-50">
        <div class="flex flex-col items-center gap-1" onclick="window.scrollTo({top:0, behavior:'smooth'})"><div class="bottom-btn bg-white">🗓️</div><span class="text-[10px] font-black">行程</span></div>
        <div class="flex flex-col items-center gap-1" onclick="calculateRate()"><div class="bottom-btn bg-[var(--lemon)]">¥</div><span class="text-[10px] font-black">匯率</span></div>
        <div class="flex flex-col items-center gap-1" onclick="openModal('ledger-modal')"><div class="bottom-btn bg-[var(--orchid)] text-white">💰</div><span class="text-[10px] font-black">分帳</span></div>
        <div class="flex flex-col items-center gap-1" onclick="openModal('pack-modal')"><div class="bottom-btn bg-[var(--purple)] text-white">🧳</div><span class="text-[10px] font-black">行李</span></div>
    </div>

    <div id="ledger-modal" class="modal" onclick="if(event.target==this)closeModal('ledger-modal')">
        <div class="bg-white border-4 border-[#333] p-6 rounded-3xl w-[92%] max-w-md shadow-[8px_8px_0px_#333] overflow-y-auto max-h-[85vh]">
            <h2 class="text-xl font-black mb-4 text-[var(--orchid)]">💰 實名分帳結算</h2>
            <div id="total-summary" class="grid grid-cols-2 gap-2 mb-4 bg-gray-100 p-3 rounded-2xl border-2 border-gray-300 text-xs font-black text-center">
                <div>拉拉: <span id="sum-拉拉" class="text-pink-600">0</span></div>
                <div>芸婷: <span id="sum-芸婷" class="text-pink-600">0</span></div>
                <div>文錢: <span id="sum-文錢" class="text-pink-600">0</span></div>
                <div>依辰: <span id="sum-依辰" class="text-pink-600">0</span></div>
            </div>
            <input id="exp-amt" type="number" placeholder="日幣金額 JPY" class="w-full border-2 border-[#333] p-3 rounded-xl mb-4 font-bold">
            <div class="grid grid-cols-2 gap-3 mb-6">
                <input type="checkbox" id="m1" class="hidden" checked value="拉拉"><label for="m1" class="border-2 border-gray-100 p-2 rounded-xl text-center font-black cursor-pointer">拉拉</label>
                <input type="checkbox" id="m2" class="hidden" checked value="芸婷"><label for="m2" class="border-2 border-gray-100 p-2 rounded-xl text-center font-black cursor-pointer">芸婷</label>
                <input type="checkbox" id="m3" class="hidden" checked value="文錢"><label for="m3" class="border-2 border-gray-100 p-2 rounded-xl text-center font-black cursor-pointer">文錢</label>
                <input type="checkbox" id="m4" class="hidden" checked value="依辰"><label for="m4" class="border-2 border-gray-100 p-2 rounded-xl text-center font-black cursor-pointer">依辰</label>
            </div>
            <button onclick="saveExp()" class="w-full bg-[var(--lemon)] border-2 border-[#333] py-3 rounded-xl font-black">紀錄並更新總額</button>
            <div id="exp-list" class="mt-4 space-y-2"></div>
        </div>
    </div>

    <div id="pack-modal" class="modal" onclick="if(event.target==this)closeModal('pack-modal')">
        <div class="bg-white border-4 border-[#333] p-6 rounded-3xl w-[92%] max-w-md shadow-[8px_8px_0px_#333]">
            <h2 class="text-xl font-black mb-4 text-[var(--purple)]">🧳 行李清單</h2>
            <div id="checklist" class="space-y-3 font-black"></div>
        </div>
    </div>

    <script>
        const travelData = {
            1: { date: "3/6 (五)", title: "抵達京都", items: [
                { t: "07:00", l: "桃園機場 T1 集合", d: "樂桃 MM024 航班報到", links: [{n: "✈️ 實時航班動態", u: "https://www.trip.com/webapp/flight/schedule/detail.html?flightNo=MM024"}] },
                { t: "14:44", l: "🚄 JR HARUKA", d: "直達京都車站 (16:04 抵達)", links: [
                    {n: "🛒 Klook 訂票($424)", u: "https://s.klook.com/c/my45rLeWwO"},
                    {n: "🕒 官方時刻表", u: "https://www.westjr.co.jp/global/en/timetable/pdf/haruka_timetable.pdf"}
                ]},
                { t: "16:15", l: "🏨 Check-in", d: "アルアホテル京都 (Ala Hotel)", links: [{n: "📍 飯店地圖導航", u: "https://www.google.com/maps/search/?api=1&query=Ala+Hotel+Kyoto"}] },
                { t: "18:30", l: "🍚 晚餐選單", d: "居酒屋/燒肉/拉麵", links: [
                    {n: "🥩 京的燒肉處 弘", u: "https://www.google.com/maps/search/?api=1&query=京の焼肉処+弘+京都駅前店"},
                    {n: "🍜 拉麵小路", u: "https://www.google.com/maps/search/?api=1&query=京都拉麵小路"}
                ]}
            ]},
            2: { date: "3/7 (六)", title: "清水寺和服", items: [
                { t: "09:00", l: "👘 璃光和服體驗", d: "祇園店 預約 09:00", links: [{n: "📍 璃光和服地圖", u: "https://www.google.com/maps/search/?api=1&query=璃光和服+祇園店"}] },
                { t: "10:00", l: "🏮 清水寺參拜", d: "三/二年坂散策 (建議計程車上山)", links: [] },
                { t: "13:30", l: "🍚 午餐：玄品ふぐ", d: "河豚料理體驗", links: [{n: "🍴 玄品河豚 預約", u: "https://www.guenpin.com/"}] },
                { t: "16:00", l: "🛍️ 京都百貨大攻略", d: "永旺/Porta/伊勢丹/Avanti", links: [{n: "🏬 京都 Porta 官網", u: "https://www.yodobashi.com/"}] }
            ]},
            3: { date: "3/8 (日)", title: "天橋立一日遊", items: [
                { t: "08:30", l: "📍 京都站八條口集合", d: "集合地點：AVANTI 廣場前方", links: [{n: "📍 集合點地圖", u: "https://www.google.com/maps/search/?api=1&query=Kyoto+Avanti"}] },
                { t: "10:20", l: "🐉 天橋立 View Land", d: "飛龍觀、特色吊椅、單軌車", links: [{n: "🚠 View Land 官網", u: "https://www.amanohashidate.com/viewland/"}] },
                { t: "13:30", l: "🚢 伊根灣觀光船", d: "餵海鷗、漫步舟屋群", links: [{n: "🚢 觀光船時刻表", u: "https://www.ine-kankou.jp/china-t"}] },
                { t: "18:30", l: "🏨 大阪飯店 Check-in", d: "東橫 INN 大阪難波", links: [{n: "🦀 蟹道樂 預約", u: "https://douraku.co.jp/"}] }
            ]},
            4: { date: "3/9 (一)", title: "環球 25週年", items: [
                { t: "07:30", l: "🎢 USJ 入園準備", d: "難波出發，建議提早排隊", links: [] },
                { t: "08:15", l: "🎟️ 入園搶券", d: "APP 領取任天堂整理券", links: [{n: "📱 USJ App 下載", u: "https://www.usj.co.jp/web/ja/jp/enjoy/app"}] },
                { t: "14:00", l: "⚡ 25週年大巡遊", d: "NO LIMIT! Parade (皮卡丘登場)", links: [] },
                { t: "19:00", l: "🍚 晚餐：CityWalk", d: "推薦 Red Lobster 或 難波周邊", links: [] }
            ]},
            5: { date: "3/10 (二)", title: "勝尾寺 & 大阪城", items: [
                { t: "08:00", l: "🔴 出發 勝尾寺", d: "地鐵御堂筋線 ➔ 29號巴士", links: [{n: "🚌 29號巴士時刻", u: "https://www.hankyubus.co.jp/"}] },
                { t: "12:30", l: "🏯 大阪城公園", d: "天守閣拍照 / 安宅丸船", links: [{n: "⛴️ 安宅丸預約", u: "https://www.suijo-bus.jp/"}] },
                { t: "15:00", l: "🍳 千日前道具街", d: "地圖導航 (餐具、模型)", links: [{n: "📍 道具街導航", u: "https://www.google.com/maps/search/?api=1&query=千日前道具屋筋商店街"}] },
                { t: "17:00", l: "🗼 通天閣 + 新世界", d: "TOWER SLIDER 溜滑梯體驗", links: [] }
            ]},
            6: { date: "3/11 (三)", title: "準備回台", items: [
                { t: "08:00", l: "🚄 南海電鐵 Rapi:t", d: "前往關西機場 T1", links: [{n: "🎫 Rapi:t 訂票", u: "https://www.howto-osaka.com/tc/rapit/"}] },
                { t: "11:30", l: "✈️ MM023 起飛", d: "13:50 抵達桃園 T1", links: [{n: "✈️ 回程航班動態", u: "https://www.trip.com/webapp/flight/schedule/detail.html?flightNo=MM023"}] }
            ]}
        };

        const packingItems = ["護照", "日幣現金", "行動電源", "網卡", "外套", "常備藥", "充電器", "環保袋"];

        function init() {
            const selector = document.getElementById('day-selector');
            for (let i = 1; i <= 6; i++) {
                const day = travelData[i];
                selector.innerHTML += `<button onclick="showDay(${i})" id="btn-day-${i}" class="flex-shrink-0 p-3 day-btn">
                    <div class="day-label text-gray-400">D${i}</div>
                    <div class="date-label">03/${5+i}</div>
                    <div class="text-[10px] font-black text-orchid-500">${day.date.split(' ')[1]}</div>
                </button>`;
            }
            const check = document.getElementById('checklist');
            packingItems.forEach(it => check.innerHTML += `<div class="p-4 bg-[var(--petal)] rounded-2xl border-2 border-[#333] mb-2" onclick="this.classList.toggle('opacity-50')">⬜ ${it}</div>`);
            showDay(1);
            renderExp();
        }

        function showDay(dayNum) {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('day-btn-active'));
            document.getElementById(`btn-day-${dayNum}`).classList.add('day-btn-active');
            document.getElementById('display-date').innerText = `DAY ${dayNum} ${travelData[dayNum].title}`;
            const container = document.getElementById('timeline-items');
            container.innerHTML = '';
            travelData[dayNum].items.forEach((item, idx) => {
                container.innerHTML += `<div class="relative">
                    <span class="time-tag">${item.t}</span>
                    <div class="neo-card p-5" onclick="toggleD('d-${dayNum}-${idx}')">
                        <h2 class="text-xl font-black">${item.l}</h2>
                        <div id="d-${dayNum}-${idx}" class="hidden-detail mt-4 text-sm font-bold border-t-2 border-dashed pt-4 text-gray-500">
                            <p>📝 ${item.d}</p>
                            ${item.links ? item.links.map(l => `<a href="${l.u}" target="_blank" class="nav-link">🔗 ${l.n}</a>`).join('') : ''}
                        </div>
                    </div>
                </div>`;
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function toggleD(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block' ? 'none' : 'block'); }
        
        function saveExp() {
            const amt = parseInt(document.getElementById('exp-amt').value);
            const m = Array.from(document.querySelectorAll('#ledger-modal input:checked')).map(cb => cb.value);
            if(!amt || m.length === 0) return;
            const list = JSON.parse(localStorage.getItem('jptrip_v3') || '[]');
            list.push({ amt, m, per: Math.round(amt/m.length), t: new Date().toLocaleTimeString() });
            localStorage.setItem('jptrip_v3', JSON.stringify(list));
            document.getElementById('exp-amt').value = '';
            renderExp();
        }

        function renderExp() {
            const list = JSON.parse(localStorage.getItem('jptrip_v3') || '[]');
            const sums = { "拉拉": 0, "芸婷": 0, "文錢": 0, "依辰": 0 };
            list.forEach(i => i.m.forEach(name => sums[name] += i.per));
            for(let name in sums) document.getElementById(`sum-${name}`).innerText = `¥${sums[name].toLocaleString()}`;
            document.getElementById('exp-list').innerHTML = list.reverse().slice(0, 3).map(i => `<div class="text-[10px] font-bold bg-white border p-2 rounded-lg">¥${i.amt} (${i.m.join(',')}) 每人¥${i.per}</div>`).join('');
        }

        function calculateRate() { const j = prompt("日幣:", "1000"); if(j) alert(`¥${j} ≈ $${Math.round(j*0.21)}`); }
        window.onload = init;
    </script>
</body>
</html>
