<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP Travel 2026 - Smart Timeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F3F4F6; font-family: -apple-system, sans-serif; }
        .neo-brutal { border: 3px solid black; box-shadow: 5px 5px 0px black; transition: 0.2s; }
        .neo-brutal:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px black; }
        /* 隱藏捲軸但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <div class="sticky top-0 bg-white border-b-4 border-black z-50 p-4">
        <div class="flex overflow-x-auto gap-3 no-scrollbar py-2">
            <button onclick="showDay(1)" class="flex-shrink-0 w-20 h-24 border-4 border-black flex flex-col items-center justify-center bg-black text-white rounded-xl">
                <span class="text-xs">DAY 1</span>
                <span class="text-lg font-black">03/06</span>
            </button>
            <button onclick="showDay(2)" class="flex-shrink-0 w-20 h-24 border-4 border-black flex flex-col items-center justify-center bg-white text-black rounded-xl hover:bg-orange-500">
                <span class="text-xs">DAY 2</span>
                <span class="text-lg font-black">03/07</span>
            </button>
            <button onclick="showDay(3)" class="flex-shrink-0 w-20 h-24 border-4 border-black flex flex-col items-center justify-center bg-white text-black rounded-xl">
                <span class="text-xs">DAY 3</span>
                <span class="text-lg font-black">03/08</span>
            </button>
            </div>
        <div class="mt-4 flex justify-between items-center">
            <h1 class="text-2xl font-black italic uppercase" id="current-day-title">3/6 京都抵達</h1>
            <div class="bg-orange-500 border-2 border-black px-2 font-bold italic">18°C ☀️</div>
        </div>
    </div>

    <div class="p-6 space-y-8 relative">
        <div class="absolute left-10 top-0 bottom-0 w-1 bg-gray-300 -z-10"></div>

        <div class="relative pl-12">
            <div class="absolute left-2 top-0 w-6 h-6 bg-green-500 border-4 border-black rounded-full z-10"></div>
            <div class="bg-white neo-brutal rounded-2xl overflow-hidden" onclick="toggleDetail('detail1')">
                <div class="border-l-[12px] border-green-500 p-4">
                    <span class="text-xs font-bold text-gray-500 uppercase">早上</span>
                    <h2 class="text-xl font-black flex justify-between items-center">
                        ✈️ 桃園機場 T1
                        <span class="text-sm bg-black text-white px-2 uppercase">09:40</span>
                    </h2>
                    <p class="text-sm font-bold text-gray-400 mt-1 italic">報到與登機</p>
                    
                    <div id="detail1" class="hidden mt-4 pt-4 border-t-2 border-dashed border-gray-200">
                        <div class="bg-gray-50 p-3 border-2 border-black rounded-lg text-sm font-mono">
                            航班：GK50 航廈：T1<br>
                            備註：提早 2 小時抵達，記得拿網卡
                        </div>
                        <a href="#" class="block mt-3 bg-blue-500 text-white text-center py-2 font-black border-2 border-black shadow-[2px_2px_0px_black]">地圖導航</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="relative pl-12">
            <div class="absolute left-2 top-0 w-6 h-6 bg-blue-500 border-4 border-black rounded-full z-10"></div>
            <div class="bg-white neo-brutal rounded-2xl overflow-hidden" onclick="toggleDetail('detail2')">
                <div class="border-l-[12px] border-blue-500 p-4">
                    <span class="text-xs font-bold text-gray-500 uppercase">下午</span>
                    <h2 class="text-xl font-black flex justify-between items-center">
                        🚄 JR HARUKA
                        <span class="text-sm bg-black text-white px-2 uppercase">14:44</span>
                    </h2>
                    <p class="text-sm font-bold text-gray-400 mt-1 italic">關西機場 ➔ 京都</p>
                    
                    <div id="detail2" class="hidden mt-4 pt-4 border-t-2 border-dashed border-gray-200">
                        <div class="bg-yellow-50 p-3 border-2 border-black rounded-lg text-sm">
                            ⚠️ Klook 票券尚未購買<br>
                            出站口：JR 地下東口
                        </div>
                        <a href="https://s.klook.com/..." class="block mt-3 bg-orange-500 text-black text-center py-2 font-black border-2 border-black shadow-[2px_2px_0px_black]">前往 Klook 訂購</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="relative pl-12">
            <div class="absolute left-2 top-0 w-6 h-6 bg-purple-500 border-4 border-black rounded-full z-10"></div>
            <div class="bg-white neo-brutal rounded-2xl overflow-hidden" onclick="toggleDetail('detail3')">
                <div class="border-l-[12px] border-purple-500 p-4">
                    <span class="text-xs font-bold text-gray-500 uppercase">入住</span>
                    <h2 class="text-xl font-black italic">🏨 アルアホテル京都</h2>
                    <p class="text-sm font-bold text-gray-400 mt-1 italic">ALA HOTEL KYOTO</p>
                    
                    <div id="detail3" class="hidden mt-4 pt-4 border-t-2 border-dashed border-gray-200">
                        <p class="text-sm leading-relaxed">〒600-8212 京都府京都市下京区東洞院通七条下る塩小路町518</p>
                        <button class="w-full mt-3 border-2 border-black py-2 font-black">顯示訂房代號</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t-4 border-black p-4 flex justify-around items-center z-50">
        <button class="font-black text-orange-600">行程</button>
        <button class="w-12 h-12 bg-black text-white rounded-full flex items-center justify-center text-xl">¥</button>
        <button class="font-black">記帳</button>
    </div>

    <script>
        // 切換詳細資訊顯示
        function toggleDetail(id) {
            const detail = document.getElementById(id);
            if (detail.classList.contains('hidden')) {
                detail.classList.remove('hidden');
            } else {
                detail.classList.add('hidden');
            }
        }

        // 切換天數標題 (示範用)
        function showDay(dayNum) {
            const titles = {
                1: "3/6 京都抵達",
                2: "3/7 清水寺巡禮",
                3: "3/8 奈良一日遊"
            };
            document.getElementById('current-day-title').innerText = titles[dayNum];
            alert("正在切換至 Day " + dayNum + " 的行程...");
        }
    </script>
</body>
</html>
