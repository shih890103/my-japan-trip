<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 JP Travel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --pink: #F2CFD7; --blue: #D6E6E5; --green: #E2E2A8; --yellow: #FEE088; }
        body { background-color: #FFFDF9; font-family: -apple-system, "Noto Sans TC", sans-serif; }
        .neo-card { border: 3px solid #333; box-shadow: 6px 6px 0px var(--pink); background: white; border-radius: 15px; margin-bottom: 24px; position: relative; z-index: 10; }
        .day-btn { border: 3px solid #333; transition: 0.2s; background: white; min-width: 80px; }
        .day-btn-active { background-color: var(--pink) !important; transform: scale(1.05); }
        /* 時間軸直線致中 */
        .timeline-line { position: absolute; left: 56px; top: 0; bottom: 0; width: 4px; background-color: var(--blue); z-index: 0; }
        .time-tag { background: var(--green); color: #333; padding: 2px 8px; border: 2px solid #333; font-weight: 900; border-radius: 8px; z-index: 20; position: relative; width: 65px; text-align: center; flex-shrink: 0; }
        .nav-link { background: var(--yellow); color: #333; padding: 10px; border-radius: 12px; font-weight: 900; text-align: center; display: block; margin-top: 10px; border: 2px solid #333; font-size: 13px; }
        #ledger-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
        .member-cb:checked + label { background-color: var(--yellow); border-color: #333; }
    </style>
</head>
<body class="pb-24">

    <div class="sticky top-0 bg-white border-b-4 border-[#333] z-50 p-4">
        <div class="flex overflow-x-auto gap-3 no-scrollbar py-2" id="day-selector"></div>
        <div class="mt-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-gray-800" id="display-date">DAY 1</h1>
            <div id="weather-tag" class="bg-[var(--yellow)] border-2 border-[#333] px-3 py-1 rounded-full font-bold text-sm">☀️ 12°C</div>
        </div>
    </div>

    <div class="p-6 relative min-h-screen">
        <div class="timeline-line"></div>
        <div id="timeline-container" class="space-y-8 relative"></div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t-4 border-[#333] p-4 flex justify-around items-center z-50">
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="font-black text-gray-700">行程</button>
        <button onclick="calculateRate()" class="w-14 h-14 bg-[var(--yellow)] border-4 border-[#333] text-gray-700 rounded-full flex items-center justify-center text-2xl font-black shadow-[4px_4px_0px_#333]">¥</button>
        <button onclick="toggleLedger()" class="w-14 h-14 bg-[var(--pink)] border-4 border-[#333] text-gray-700 rounded-full flex items-center justify-center text-2xl font-black shadow-[4px_4px_0px_#333]">💰</button>
    </div>

    <div id="ledger-modal" onclick="if(event.target==this)toggleLedger()">
        <div class="bg-white border-4 border-[#333] p-6 rounded-3xl w-[92%] max-w-md shadow-[8px_8px_0px_#333] max-h-[80vh] overflow-y-auto">
            <h2 class="text-xl font-black mb-4">💰 實名分帳系統</h2>
            <input id="exp-amt" type="number" placeholder="輸入日幣金額 JPY" class="w-full border-2 border-[#333] p-3 rounded-xl mb-4 font-bold text-lg">
            <p class="font-black mb-3 text-sm text-gray-500">誰要攤分？(可多選)</p>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <input type="checkbox" id="m1" class="hidden member-cb" value="拉拉" checked><label for="m1" class="border-2 border-gray-200 p-2 rounded-xl text-center font-black cursor-pointer">拉拉</label>
                <input type="checkbox" id="m2" class="hidden member-cb" value="芸婷" checked><label for="m2" class="border-2 border-gray-200 p-2 rounded-xl text-center font-black cursor-pointer">芸婷</label>
                <input type="checkbox" id="m3" class="hidden member-cb" value="文錢" checked><label for="m3" class="border-2 border-gray-200 p-2 rounded-xl text-center font-black cursor-pointer">文錢</label>
                <input type="checkbox" id="m4" class="hidden member-cb" value="依辰" checked><label for="m4" class="border-2 border-gray-200 p-2 rounded-xl text-center font-black cursor-pointer">依辰</label>
            </div>
            <button onclick="saveExp()" class="w-full bg-[var(--green)] border-2 border-[#333] py-3 rounded-xl font-black text-lg shadow-[4px_4px_0px_#333] active:translate-y-1">確認記錄</button>
            <div id="exp-list" class="mt-8 border-t-2 border-dashed pt-4 space-y-3"></div>
        </div>
    </div>

    <script>
        const weatherData = { 1:"☀️ 12°C", 2:"☁️ 10°C", 3:"🌤️ 8°C", 4:"☀️ 11°C", 5:"🌧️ 9°C", 6:"🌤️ 12°C" };
        const travelData = {
            1: { date: "3/6 (五)", title: "抵達京都", items: [
                { t: "07:00", l: "桃園機場 T1 集合", d: "航班 MM024 (09:40-13:10)", links: [{n: "✈️ MM024 航班實時動態", u: "https://www.trip.com/webapp/flight/schedule/detail.html?flightNo=MM024"}] },
                { t: "14:44", l: "JR HARUKA", d: "往京都 (16:04抵達)", links: [{n: "🛒 Klook 訂購 ($424)", u: "https://s.klook.com/c/my45rLeWwO"}] },
                { t: "16:45", l: "晚餐選項", d: "燒肉弘/拉麵小路/Kitada", links: [{n: "🥩 燒肉 弘 導航", u: "https://maps.app.goo.gl/htujbBKAAdkCHFDt8?g_st=ipc"},{n: "🍜 拉麵小路", u: "https://maps.app.goo.gl/FGw9BVes7NiHvedF6?g_st=ipc"}] }
            ]},
            2: { date: "3/7 (六)", title: "清水寺和服", items: [
                { t: "09:00", l: "璃光和服 祇園店", d: "和服體驗與清水寺", links: [{n: "📍 和服店地圖", u: "https://maps.app.goo.gl/D5QwiTvcQ6ojXG227?g_st=ipc"}] },
                { t: "16:00", l: "百貨逛街", d: "永旺/Porta/伊勢丹/Avanti", links: [{n: "🏬 永旺百貨", u: "https://maps.app.goo.gl/XLuaWAbnVcCAa4UN6?g_st=ipc"},{n: "🏬 Porta 貝果", u: "https://maps.app.goo.gl/RomrA1h6zyL7KHBb8?g_st=ipc"}] }
            ]},
            3: { date: "3/8 (日)", title: "天橋立一日遊", items: [
                { t: "08:30", l: "京都站八條口集合", d: "AVANTI 廣場前", links: [{n: "📍 集合點地圖", u: "https://maps.app.goo.gl/Jw9C1PZkPN9nJ4eJ6?g_st=ipc"}] },
                { t: "10:20", l: "天橋立 View land", d: "飛龍觀、特色吊椅", links: [] },
                { t: "13:30", l: "伊根灣觀光船", d: "餵海鷗、舟屋散策", links: [] }
            ]},
            4: { date: "3/9 (一)", title: "環球 25週年", items: [
                { t: "07:00", l: "抵達影城門口", d: "排隊搶入園", links: [] },
                { t: "13:00", l: "25週年特別遊行", d: "NO LIMIT! Parade (皮卡丘)", links: [] },
                { t: "18:00", l: "二進任天堂", d: "夜晚點燈氛圍", links: [] }
            ]},
            5: { date: "3/10 (二)", title: "勝尾寺 & 大阪", items: [
                { t: "09:30", l: "勝尾寺 (必拍達摩)", d: "勝運聖地", links: [] },
                { t: "17:00", l: "通天閣 & 新世界", d: "晚餐吃炸串、逛唐吉", links: [{n: "🐧 難波唐吉導航", u: "https://maps.app.goo.gl/PF3oZn5uV96eT9aJ6?g_st=ipc"}] }
            ]},
            6: { date: "3/11 (三)", title: "準備回台", items: [
                { t: "08:00", l: "南海難波站", d: "Rapi:t 往機場", links: [] },
                { t: "09:30", l: "關西機場 T1", d: "航班 MM023 (11:30起飛)", links: [{n: "🛍️ KIX 免稅店", u: "https://www.kixdutyfree.jp/tw/"}] }
            ]}
        };

        function initButtons() {
            const selector = document.getElementById('day-selector');
            for (let i = 1; i <= 6; i++) {
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 w-24 h-24 flex flex-col items-center justify-center rounded-2xl day-btn font-black`;
                btn.id = `btn-day-${i}`;
                btn.onclick = () => showDay(i);
                btn.innerHTML = `<span class="text-xs text-gray-400">DAY ${i}</span><span class="text-lg">03/${5+i}</span>`;
                selector.appendChild(btn);
            }
            showDay(1);
        }

        function showDay(dayNum) {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('day-btn-active'));
            document.getElementById(`btn-day-${dayNum}`).classList.add('day-btn-active');
            document.getElementById('weather-tag').innerText = weatherData[dayNum] || "☀️ 12°C";
            const data = travelData[dayNum];
            document.getElementById('display-date').innerText = `DAY ${dayNum} ${data.title}`;
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';
            data.items.forEach((item, idx) => {
                const card = `
                    <div class="flex items-start gap-6 relative">
                        <span class="time-tag shadow-[2px_2px_0px_#333]">${item.t}</span>
                        <div class="neo-card flex-1 p-5" onclick="toggleDetail('d-${dayNum}-${idx}')">
                            <h2 class="text-lg font-black text-gray-800">${item.l}</h2>
                            <p class="text-xs font-bold text-gray-400 mt-2">✦ ${item.d}</p>
                            <div id="d-${dayNum}-${idx}" class="${item.links && item.links.length > 0 ? '' : 'hidden'} mt-4">
                                ${item.links ? item.links.map(l => `<a href="${l.u}" target="_blank" class="nav-link" onclick="event.stopPropagation()">🔗 ${l.n}</a>`).join('') : ''}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function toggleLedger() { const m = document.getElementById('ledger-modal'); m.style.display = (m.style.display=='flex'?'none':'flex'); renderExp(); }
        function saveExp() {
            const amt = document.getElementById('exp-amt').value;
            const selectedMembers = Array.from(document.querySelectorAll('.member-cb:checked')).map(cb => cb.value);
            if(!amt || selectedMembers.length === 0) return alert('請輸入金額並選擇成員');
            const list = JSON.parse(localStorage.getItem('jptrip_v4') || '[]');
            const per = Math.round(amt / selectedMembers.length);
            list.push({ amt, members: selectedMembers, per, time: new Date().toLocaleTimeString() });
            localStorage.setItem('jptrip_v4', JSON.stringify(list));
            document.getElementById('exp-amt').value = '';
            renderExp();
        }
        function renderExp() {
            const list = JSON.parse(localStorage.getItem('jptrip_v4') || '[]');
            const container = document.getElementById('exp-list');
            container.innerHTML = '<h3 class="font-black text-sm mb-2 text-pink-500">最近紀錄：</h3>';
            list.reverse().slice(0, 10).forEach(i => {
                container.innerHTML += `<div class="bg-gray-50 p-3 rounded-xl border-2 border-gray-200">
                    <div class="flex justify-between font-black text-gray-800"><span>¥${i.amt}</span><span class="text-xs text-gray-400">${i.time}</span></div>
                    <div class="text-[10px] text-blue-500 font-bold mt-1">參與人員：${i.members.join(', ')}</div>
                    <div class="text-xs font-black text-pink-500 mt-1">每人應付：¥${i.per}</div>
                </div>`;
            });
        }
        function calculateRate() { const j = prompt("日幣 (JPY):", "1000"); if(j) alert(`¥${j} ≈ $${Math.round(j*0.21)}`); }
        function toggleDetail(id) { document.getElementById(id).classList.toggle('hidden'); }
        window.onload = initButtons;
    </script>
</body>
</html>
