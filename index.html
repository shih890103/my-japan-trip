<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 JP Travel Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --purple: #b594d0; --orchid: #d176ac; --lemon: #f9de90; --peach: #f8c6a1; --petal: #f5dde3; }
        body { background-color: var(--petal); font-family: -apple-system, "Noto Sans TC", sans-serif; color: #444; overflow-x: hidden; }
        .day-btn { border: 3px solid #333; background: white; min-width: 90px; border-radius: 18px; transition: 0.2s; }
        .day-btn-active { background-color: var(--orchid) !important; color: white; transform: translateY(-3px); box-shadow: 0px 4px 0px #333; }
        .date-label { font-size: 19px; font-weight: 900; }
        .timeline-container { position: relative; padding-left: 95px; } 
        .timeline-line { position: absolute; left: 45px; top: 0; bottom: 0; width: 5px; background-color: var(--purple); z-index: 0; border-left: 2px solid #333; }
        .time-tag { position: absolute; left: -95px; top: 15px; background: var(--peach); color: #333; padding: 5px 12px; border: 3px solid #333; font-weight: 900; border-radius: 12px; z-index: 10; font-size: 15px; width: 85px; text-align: center; box-shadow: 3px 3px 0px #333; }
        .neo-card { border: 3px solid #333; box-shadow: 5px 5px 0px var(--orchid); background: white; border-radius: 18px; margin-bottom: 25px; transition: 0.3s; cursor: pointer; width: 100%; position: relative; }
        .nav-link { background: var(--lemon); color: #333; padding: 10px; border-radius: 12px; font-weight: 900; text-align: center; display: block; margin-top: 10px; border: 2px solid #333; font-size: 13px; }
        .hidden-detail { display: none; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; border: 4px solid #333; border-radius: 24px; width: 100%; max-width: 400px; max-height: 80vh; overflow-y: auto; padding: 24px; position: relative; box-shadow: 10px 10px 0px #333; }
        .bottom-btn { width: 56px; height: 56px; border: 3px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 4px 4px 0px #333; transition: 0.1s; }
        .person-label { border: 2px solid #333; padding: 8px; border-radius: 12px; text-align: center; font-weight: 900; cursor: pointer; background: #f0f0f0; }
        input:checked + .person-label { background: var(--orchid); color: white; }
        .check-item { background: var(--petal); border: 2px solid #333; border-radius: 14px; padding: 12px; margin-bottom: 8px; font-weight: 900; display: flex; align-items: center; gap: 10px; }
        .checked-strikethrough { text-decoration: line-through; opacity: 0.6; }
    </style>
</head>
<body class="pb-32">
    <div class="sticky top-0 bg-white border-b-4 border-[#333] z-50 p-4">
        <div class="flex overflow-x-auto gap-3 no-scrollbar py-2" id="day-selector"></div>
        <div class="mt-4 flex justify-between items-center px-2">
            <h1 class="text-xl font-black" id="display-date">DAY 1</h1>
            <div id="weather-tag" class="bg-[var(--lemon)] border-2 border-[#333] px-3 py-1 rounded-full font-black text-xs shadow-[2px_2px_0px_#333]">☀️ 12°C</div>
        </div>
    </div>

    <div class="p-6">
        <div class="timeline-container"><div class="timeline-line"></div><div id="timeline-items" class="space-y-8"></div></div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t-4 border-[#333] p-4 flex justify-around items-center z-[100]">
        <div class="flex flex-col items-center gap-1" onclick="window.scrollTo({top:0, behavior:'smooth'})"><div class="bottom-btn bg-white">🗓️</div><span class="text-[10px] font-black">行程</span></div>
        <div class="flex flex-col items-center gap-1" onclick="calculateRate()"><div class="bottom-btn bg-[var(--lemon)]">¥</div><span class="text-[10px] font-black">匯率</span></div>
        <div class="flex flex-col items-center gap-1" onclick="openModal('ledger-modal')"><div class="bottom-btn bg-[var(--orchid)] text-white">💰</div><span class="text-[10px] font-black">分帳</span></div>
        <div class="flex flex-col items-center gap-1" onclick="openModal('pack-modal')"><div class="bottom-btn bg-[var(--purple)] text-white">🧳</div><span class="text-[10px] font-black">行李</span></div>
    </div>

    <div id="ledger-modal" class="modal" onclick="if(event.target==this)closeModal('ledger-modal')">
        <div class="modal-content">
            <h2 class="text-2xl font-black mb-4 text-[var(--orchid)]">💰 實名分帳</h2>
            <div class="grid grid-cols-2 gap-2 mb-6 bg-gray-100 p-3 rounded-2xl border-2 border-[#333] text-xs font-black">
                <div>拉拉: <span id="sum-拉拉" class="text-pink-600">0</span></div>
                <div>芸婷: <span id="sum-芸婷" class="text-pink-600">0</span></div>
                <div>文錢: <span id="sum-文錢" class="text-pink-600">0</span></div>
                <div>依辰: <span id="sum-依辰" class="text-pink-600">0</span></div>
            </div>
            <input id="exp-amt" type="number" pattern="\d*" placeholder="日幣金額 JPY" class="w-full border-3 border-[#333] p-4 rounded-xl mb-4 font-black text-lg">
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div><input type="checkbox" id="p1" class="hidden" checked value="拉拉"><label for="p1" class="person-label block">拉拉</label></div>
                <div><input type="checkbox" id="p2" class="hidden" checked value="芸婷"><label for="p2" class="person-label block">芸婷</label></div>
                <div><input type="checkbox" id="p3" class="hidden" checked value="文錢"><label for="p3" class="person-label block">文錢</label></div>
                <div><input type="checkbox" id="p4" class="hidden" checked value="依辰"><label for="p4" class="person-label block">依辰</label></div>
            </div>
            <button onclick="saveExp()" class="w-full bg-[var(--lemon)] border-3 border-[#333] py-4 rounded-xl font-black shadow-[4px_4px_0px_#333] mb-2">新增紀錄</button>
            <button onclick="clearExp()" class="w-full text-xs text-gray-400 font-bold underline">清空紀錄</button>
            <div id="exp-list" class="mt-6 space-y-2 border-t-2 border-dashed pt-4"></div>
        </div>
    </div>

    <div id="pack-modal" class="modal" onclick="if(event.target==this)closeModal('pack-modal')">
        <div class="modal-content">
            <h2 class="text-2xl font-black mb-4 text-[var(--purple)]">🧳 必備清單</h2>
            <div id="checklist" class="space-y-3"></div>
            <button onclick="closeModal('pack-modal')" class="w-full mt-6 bg-gray-200 border-2 border-[#333] py-3 rounded-xl font-black">關閉</button>
        </div>
    </div>

    <script>
        const weatherForecast = { 1: "☀️ 京都 12°C", 2: "☁️ 京都 10°C", 3: "🌤️ 天橋立 8°C", 4: "☀️ 大阪 13°C", 5: "🌤️ 箕面 11°C", 6: "☀️ 關西 12°C" };
        const travelData = {
            1: { date: "3/6 (五)", title: "抵達京都・序曲", items: [
                { t: "07:00", l: "桃園機場 T1 集合", d: "樂桃 MM024 航班 (10:25 起飛)", links: [
                    {n: "✈️ 實時航班動態", u: "https://www.trip.com/webapp/flight/schedule/detail.html?flightNo=MM024"},
                    {n: "📝 Visit Japan Web", u: "https://vjw-lp.digital.go.jp/zh-hant/"}
                ]},
                { t: "15:44", l: "🚄 乘 HARUKA 40 號", d: "預計 17:10 抵達京都車站", links: [
                    {n: "🛒 Klook 買票 (掃 QR 進站)", u: "https://www.klook.com/zh-TW/activity/18400-haruka-kansai-airport-express-jr-pass/"},
                    {n: "🕒 官方時刻表", u: "https://www.westjr.co.jp/global/tc/timetable/pdf/haruka_timetable.pdf"}
                ]},
                { t: "17:30", l: "🏨 Check-in Ala Hotel", d: "飯店寄放行李與辦理入住", links: [
                    {n: "📍 飯店 Google 地圖", u: "https://goo.gl/maps/AlaHotelKyoto"},
                    {n: "🏠 飯店官網", u: "https://www.alahotel-kyoto.com/"}
                ]},
                { t: "18:30", l: "🍚 晚餐三選一", d: "燒肉/拉麵/居酒屋 (點擊展開)", links: [
                    {n: "🥩 1. 京的燒肉處 弘 (預約)", u: "https://yakiniku-hiro.com/chinese/"},
                    {n: "🍜 2. 京都拉麵小路", u: "https://www.kyoto-ramen-koji.com/"},
                    {n: "🍺 3. 居酒屋 あいよっ！", u: "https://goo.gl/maps/Aiyo_Kyoto"}
                ]},
                { t: "20:30", l: "🛍️ 晚間超市與購物", d: "驚安殿堂與 AEON 買草莓", links: [
                    {n: "🐧 唐吉訶德 (Avanti 店)", u: "https://www.donki.com/store/shop_detail.php?shop_id=402"},
                    {n: "🍓 AEON Mall 超市", u: "https://kyoto-aeonmall.com/"}
                ]}
            ]},
            2: { date: "3/7 (六)", title: "清水寺走走走", items: [
                { t: "09:00", l: "👘 璃光和服出租", d: "預約 09:00-10:00 (祇園店)", links: [{n: "📍 璃光地圖", u: "https://goo.gl/maps/RikoGion"}] },
                { t: "10:00", l: "🏮 清水寺參拜", d: "💡 推薦：4人分擔車資搭 Taxi 直達清水坂頂端，省去上坡體力！", links: [] },
                { t: "13:30", l: "🍚 午餐：玄品ふぐ", d: "河豚料理 (需預約)", links: [{n: "🍴 玄品官網", u: "https://www.guenpin.com/"}] }
            ]},
            // ... Day 3-6 略
        };

        function calculateRate() {
            const rate = 0.215; 
            const jpy = prompt("請輸入日幣金額 (JPY):", "1000");
            if (jpy && !isNaN(jpy)) {
                const twd = Math.round(jpy * rate);
                alert(`🇯🇵 ¥${parseInt(jpy).toLocaleString()} \n≈ \n🇹🇼 NT$${twd.toLocaleString()}\n(匯率預設: ${rate})`);
            }
        }

        function clearExp() {
            if(confirm("確定要清空所有分帳紀錄嗎？")) { localStorage.removeItem('jptrip_v6'); renderExp(); }
        }

        const packingItems = ["護照", "日幣現金", "行動電源", "網卡/Esim", "薄外套", "常備藥", "VJW QR Code", "ICOCA/Suica"];

        function init() {
            const selector = document.getElementById('day-selector');
            for (let i = 1; i <= 6; i++) {
                selector.innerHTML += `<button onclick="showDay(${i})" id="btn-day-${i}" class="flex-shrink-0 p-3 day-btn">
                    <div class="text-[11px] font-black text-gray-400">D${i}</div>
                    <div class="date-label">03/${5+i}</div>
                </button>`;
            }
            const check = document.getElementById('checklist');
            packingItems.forEach(it => check.innerHTML += `<div class="check-item" onclick="toggleCheck(this)"><span>⬜</span> ${it}</div>`);
            showDay(1); 
            renderExp();
        }

        function showDay(dayNum) {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('day-btn-active'));
            document.getElementById(`btn-day-${dayNum}`).classList.add('day-btn-active');
            document.getElementById('display-date').innerText = `DAY ${dayNum} ${travelData[dayNum]?.title || ""}`;
            const container = document.getElementById('timeline-items');
            container.innerHTML = '';
            (travelData[dayNum]?.items || []).forEach((item, idx) => {
                container.innerHTML += `<div class="relative">
                    <span class="time-tag">${item.t}</span>
                    <div class="neo-card p-5" onclick="toggleD('d-${dayNum}-${idx}')">
                        <h2 class="text-xl font-black">${item.l}</h2>
                        <div id="d-${dayNum}-${idx}" class="hidden-detail mt-4 text-sm font-bold border-t-2 border-dashed pt-4 text-gray-500">
                            <p>📝 ${item.d}</p>
                            ${item.links ? item.links.map(l => `<a href="${l.u}" target="_blank" class="nav-link">🔗 ${l.n}</a>`).join('') : ''}
                        </div>
                    </div>
                </div>`;
            });
        }

        function toggleCheck(el) {
            el.classList.toggle('checked-strikethrough');
            el.querySelector('span').innerText = el.classList.contains('checked-strikethrough') ? '✅' : '⬜';
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function toggleD(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block' ? 'none' : 'block'); }
        
        function saveExp() {
            const amt = parseInt(document.getElementById('exp-amt').value);
            const m = Array.from(document.querySelectorAll('#ledger-modal input:checked')).map(cb => cb.value);
            if(!amt || m.length === 0) return;
            const list = JSON.parse(localStorage.getItem('jptrip_v6') || '[]');
            list.push({ amt, m, per: Math.round(amt/m.length), t: new Date().toLocaleTimeString() });
            localStorage.setItem('jptrip_v6', JSON.stringify(list));
            document.getElementById('exp-amt').value = '';
            renderExp();
        }

        function renderExp() {
            const list = JSON.parse(localStorage.getItem('jptrip_v6') || '[]');
            const sums = { "拉拉": 0, "芸婷": 0, "文錢": 0, "依辰": 0 };
            list.forEach(i => i.m.forEach(name => { if(sums[name]!==undefined) sums[name] += i.per; }));
            for(let name in sums) document.getElementById(`sum-${name}`).innerText = `¥${sums[name].toLocaleString()}`;
            document.getElementById('exp-list').innerHTML = list.reverse().slice(0, 5).map(i => `<div class="text-[11px] font-bold bg-white border-2 border-[#333] p-2 rounded-lg">¥${i.amt.toLocaleString()} (${i.m.join(',')}) ➔ ¥${i.per.toLocaleString()}/人</div>`).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
