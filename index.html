<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 JP Travel Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --purple: #b594d0; --orchid: #d176ac; --lemon: #f9de90; 
            --peach: #f8c6a1; --petal: #f5dde3; 
        }
        body { background-color: var(--petal); font-family: -apple-system, "Noto Sans TC", sans-serif; color: #444; }
        .neo-card { border: 3px solid #333; box-shadow: 5px 5px 0px var(--orchid); background: white; border-radius: 18px; margin-bottom: 20px; transition: 0.3s; cursor: pointer; }
        .day-btn { border: 3px solid #333; background: white; min-width: 75px; border-radius: 15px; }
        .day-btn-active { background-color: var(--orchid) !important; color: white; transform: translateY(-3px); box-shadow: 0px 4px 0px #333; }
        /* 時間軸縮窄且直線致中 */
        .timeline-area { width: 50px; position: relative; display: flex; justify-content: center; flex-shrink: 0; }
        .timeline-line { position: absolute; width: 4px; background-color: var(--purple); top: 0; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 0; }
        .time-tag { background: var(--peach); color: #333; padding: 2px 6px; border: 2px solid #333; font-weight: 900; border-radius: 6px; z-index: 10; font-size: 11px; position: relative; top: 18px; height: fit-content; }
        .nav-link { background: var(--lemon); color: #333; padding: 10px; border-radius: 12px; font-weight: 900; text-align: center; display: block; margin-top: 10px; border: 2px solid #333; font-size: 13px; }
        .member-cb:checked + label { background-color: var(--lemon); border-color: #333; transform: scale(1.05); }
        #ledger-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
        .hidden-detail { display: none; }
        .item-checked { text-decoration: line-through; color: #999; }
    </style>
</head>
<body class="pb-24">

    <div class="sticky top-0 bg-white border-b-4 border-[#333] z-50 p-4">
        <div class="flex overflow-x-auto gap-3 no-scrollbar py-2" id="day-selector"></div>
        <div class="mt-4 flex justify-between items-center px-2">
            <h1 class="text-xl font-black" id="display-date">DAY 1</h1>
            <div id="weather-tag" class="bg-[var(--lemon)] border-2 border-[#333] px-3 py-1 rounded-full font-bold text-xs shadow-[2px_2px_0px_#333]">☀️ 12°C</div>
        </div>
    </div>

    <div class="p-4" id="main-content">
        <div id="timeline-container" class="relative"></div>
        
        <div class="mt-12 bg-white border-4 border-[#333] rounded-3xl p-6 shadow-[6px_6px_0px_var(--purple)]">
            <h2 class="text-xl font-black mb-4 flex items-center" style="color: var(--orchid)">🧳 旅程行李必備清單</h2>
            <div id="checklist" class="space-y-3 font-bold">
                </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t-4 border-[#333] p-4 flex justify-around items-center z-50">
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="font-black text-gray-700">行程</button>
        <button onclick="calculateRate()" class="w-14 h-14 bg-[var(--lemon)] border-4 border-[#333] rounded-full flex items-center justify-center text-2xl font-black shadow-[4px_4px_0px_#333]">¥</button>
        <button onclick="toggleLedger()" class="w-14 h-14 bg-[var(--orchid)] border-4 border-[#333] rounded-full flex items-center justify-center text-2xl font-black shadow-[4px_4px_0px_#333]">💰</button>
    </div>

    <div id="ledger-modal" onclick="if(event.target==this)toggleLedger()">
        <div class="bg-white border-4 border-[#333] p-6 rounded-3xl w-[92%] max-w-md shadow-[8px_8px_0px_#333]">
            <h2 class="text-xl font-black mb-4" style="color: var(--orchid)">💰 實名分帳系統</h2>
            <input id="exp-amt" type="number" placeholder="日幣金額 JPY" class="w-full border-2 border-[#333] p-3 rounded-xl mb-4 font-bold">
            <p class="font-black mb-3 text-xs text-gray-500">誰分錢？</p>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <input type="checkbox" id="m1" class="hidden member-cb" value="拉拉" checked><label for="m1" class="border-2 border-gray-100 p-2 rounded-xl text-center font-black cursor-pointer">拉拉</label>
                <input type="checkbox" id="m2" class="hidden member-cb" value="芸婷" checked><label for="m2" class="border-2 border-gray-100 p-2 rounded-xl text-center font-black cursor-pointer">芸婷</label>
                <input type="checkbox" id="m3" class="hidden member-cb" value="文錢" checked><label for="m3" class="border-2 border-gray-100 p-2 rounded-xl text-center font-black cursor-pointer">文錢</label>
                <input type="checkbox" id="m4" class="hidden member-cb" value="依辰" checked><label for="m4" class="border-2 border-gray-100 p-2 rounded-xl text-center font-black cursor-pointer">依辰</label>
            </div>
            <button onclick="saveExp()" class="w-full bg-[var(--lemon)] border-2 border-[#333] py-3 rounded-xl font-black">記錄支出</button>
            <div id="exp-list" class="mt-6 max-h-40 overflow-y-auto border-t-2 border-dashed pt-4"></div>
        </div>
    </div>

    <script>
        const weatherData = { 1:"☀️ 12°C", 2:"☁️ 10°C", 3:"🌤️ 8°C", 4:"☀️ 11°C", 5:"🌧️ 9°C", 6:"🌤️ 12°C" };
        const travelData = {
            1: { date: "3/6 (五)", title: "抵達京都", items: [
                { t: "07:00", l: "桃園機場 T1 集合", d: "航班 MM024 (09:40-13:10)", links: [{n: "✈️ MM024 動態", u: "https://www.trip.com/webapp/flight/schedule/detail.html?flightNo=MM024"}] },
                { t: "14:44", l: "JR HARUKA", d: "16:04 抵達京都", links: [{n: "🛒 Klook 領券", u: "https://s.klook.com/c/my45rLeWwO"}] }
            ]},
            2: { date: "3/7 (六)", title: "清水寺和服", items: [
                { t: "09:00", l: "璃光和服 祇園店", d: "預約名單確認", links: [{n: "📍 地圖導航", u: "http://maps.google.com"}] },
                { t: "16:00", l: "百貨逛街攻略", d: "Porta 貝果 / 永旺大創", links: [{n: "🏬 永旺百貨", u: "http://maps.google.com"}] }
            ]},
            3: { date: "3/8 (日)", title: "天橋立一日遊", items: [
                { t: "08:30", l: "京都站集合", d: "八條口 AVANTI 門口", links: [] },
                { t: "10:30", l: "天橋立 View Land", d: "飛龍觀、特色吊椅", links: [] },
                { t: "14:00", l: "伊根舟屋", d: "觀光船、餵海鷗", links: [] }
            ]},
            4: { date: "3/9 (一)", title: "環球 25週年", items: [
                { t: "07:00", l: "抵達影城正門", d: "提早兩小時排隊", links: [] },
                { t: "08:00", l: "入園搶券", d: "APP 領取任天堂整理券", links: [] },
                { t: "13:00", l: "25週年特別遊行", d: "皮卡丘 NO LIMIT! Parade", links: [] },
                { t: "15:00", l: "咒術迴戰 4D", d: "期間限定設施", links: [] },
                { t: "19:00", l: "超級任天堂點燈", d: "必看夜晚版奇諾比奧", links: [] }
            ]},
            5: { date: "3/10 (二)", title: "勝尾寺 & 大阪", items: [
                { t: "10:00", l: "勝尾寺", d: "必買達摩御守", links: [] },
                { t: "17:00", l: "新世界炸串", d: "大阪下町風情", links: [] }
            ]},
            6: { date: "3/11 (三)", title: "回台", items: [
                { t: "09:30", l: "關西機場 T1", d: "MM023 11:30起飛", links: [{n: "🛍️ 免稅店預訂", u: "https://www.kixdutyfree.jp/tw/"}] }
            ]}
        };

        const packingList = ["護照/簽證", "日幣/信用卡", "行動電源", "網卡/Wifi", "外套/輕便雨具", "個人藥品", "充電線", "環保袋"];

        function init() {
            const selector = document.getElementById('day-selector');
            for (let i = 1; i <= 6; i++) {
                const day = travelData[i] || { date: `3/${5+i} (？)` };
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 w-20 h-24 flex flex-col items-center justify-center day-btn font-black`;
                btn.id = `btn-day-${i}`;
                btn.onclick = () => showDay(i);
                btn.innerHTML = `<span class="text-[10px] text-gray-400">D${i}</span><span class="text-sm">${day.date.split(' ')[0]}</span><span class="text-xs text-orchid-500">${day.date.split(' ')[1]}</span>`;
                selector.appendChild(btn);
            }

            const checkContainer = document.getElementById('checklist');
            packingList.forEach((item, idx) => {
                checkContainer.innerHTML += `
                    <div class="flex items-center gap-3 p-3 bg-[var(--petal)] rounded-xl border-2 border-[#333]" onclick="this.classList.toggle('item-checked')">
                        <input type="checkbox" class="w-5 h-5 accent-[var(--orchid)]"> <span>${item}</span>
                    </div>`;
            });
            showDay(1);
        }

        function showDay(dayNum) {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('day-btn-active'));
            document.getElementById(`btn-day-${dayNum}`).classList.add('day-btn-active');
            document.getElementById('weather-tag').innerText = weatherData[dayNum] || "☀️ 12°C";
            const data = travelData[dayNum];
            document.getElementById('display-date').innerText = `DAY ${dayNum} ${data.title}`;
            
            const container = document.getElementById('timeline-container');
            container.innerHTML = '<div class="timeline-line"></div>';
            data.items.forEach((item, idx) => {
                const card = `
                    <div class="flex gap-4 min-h-[80px]">
                        <div class="timeline-area"><span class="time-tag shadow-[2px_2px_0px_#333]">${item.t}</span></div>
                        <div class="neo-card flex-1 p-5" onclick="toggleD('d-${dayNum}-${idx}')">
                            <h2 class="text-md font-black">${item.l}</h2>
                            <div id="d-${dayNum}-${idx}" class="hidden-detail mt-3 text-xs font-bold text-gray-500 border-t-2 border-dashed pt-3">
                                <p>💡 ${item.d}</p>
                                ${item.links ? item.links.map(l => `<a href="${l.u}" target="_blank" class="nav-link" onclick="event.stopPropagation()">🔗 ${l.n}</a>`).join('') : ''}
                            </div>
                        </div>
                    </div>`;
                container.innerHTML += card;
            });
        }

        function toggleD(id) { 
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'block' ? 'none' : 'block');
        }

        function toggleLedger() { const m = document.getElementById('ledger-modal'); m.style.display = (m.style.display=='flex'?'none':'flex'); renderExp(); }
        function saveExp() {
            const amt = document.getElementById('exp-amt').value;
            const members = Array.from(document.querySelectorAll('.member-cb:checked')).map(cb => cb.value);
            if(!amt || members.length === 0) return;
            const list = JSON.parse(localStorage.getItem('jptrip_v5') || '[]');
            list.push({ amt, m: members, per: Math.round(amt/members.length), t: new Date().toLocaleTimeString() });
            localStorage.setItem('jptrip_v5', JSON.stringify(list));
            document.getElementById('exp-amt').value = '';
            renderExp();
        }
        function renderExp() {
            const list = JSON.parse(localStorage.getItem('jptrip_v5') || '[]');
            document.getElementById('exp-list').innerHTML = list.reverse().slice(0,5).map(i => `
                <div class="bg-gray-50 p-3 rounded-xl border-2 border-gray-200 mb-2 text-xs font-bold">
                    ¥${i.amt} (${i.m.join(',')}) <span class="text-pink-500 ml-2">每人 ¥${i.per}</span>
                </div>`).join('');
        }
        function calculateRate() { const j = prompt("日幣 (JPY):", "1000"); if(j) alert(`¥${j} ≈ $${Math.round(j*0.21)}`); }
        window.onload = init;
    </script>
</body>
</html>
