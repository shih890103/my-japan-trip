<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP Travel 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        body { background-color: #E5E5E5; font-family: sans-serif; }
        .neo-card { background: white; border: 4px solid black; box-shadow: 8px 8px 0px black; margin-bottom: 20px; padding: 16px; transition: 0.2s; }
        .neo-card:active { transform: translate(2px, 2px); box-shadow: 4px 4px 0px black; }
        .orange-tag { background: #FF6B00; color: black; font-weight: 900; padding: 2px 8px; border: 2px solid black; display: inline-block; }
        .btn-black { background: black; color: white; font-weight: 900; padding: 10px; border: 2px solid black; width: 100%; text-align: center; display: block; margin-top: 10px; }
    </style>
</head>
<body class="p-4 pb-24">
    <h1 class="text-4xl font-black italic mb-6 border-b-4 border-black pb-2 uppercase tracking-tighter">JP Travel 2026</h1>

    <div id="timeline-section">
        <div class="neo-card">
            <span class="orange-tag">3/6 DAY 1</span>
            <h3 class="font-black text-xl mt-2">✈️ 桃園 T1 ➔ 關西 T2</h3>
            <p class="font-bold text-gray-600">13:10 抵達 / 14:44 HARUKA</p>
            <a href="https://www.google.com/maps/search/?api=1&query=京都ALA飯店" target="_blank" class="btn-black">前往 ALA 飯店導航</a>
        </div>

        <div class="neo-card">
            <span class="orange-tag">3/7 DAY 2</span>
            <h3 class="font-black text-xl mt-2">👘 璃光和服 / 清水寺</h3>
            <a href="https://www.google.com/maps/search/?api=1&query=清水寺" target="_blank" class="btn-black">前往清水寺導航</a>
        </div>

        <div class="neo-card bg-black text-white">
            <span class="orange-tag">3/10 DAY 5</span>
            <h3 class="font-black text-xl mt-2 text-white">🔴 勝尾寺 (必看達摩)</h3>
            <a href="https://www.google.com/maps/search/?api=1&query=勝尾寺" target="_blank" class="btn-black border-white">地圖導航</a>
        </div>
    </div>

    <button onclick="calculateRate()" class="fixed right-4 bottom-24 w-16 h-16 bg-[#FF6B00] border-4 border-black shadow-[4px_4px_0px_black] rounded-full font-black text-2xl z-50 active:shadow-none active:translate-x-1">¥</button>

    <nav class="fixed bottom-0 left-0 w-full bg-white border-t-4 border-black p-4 flex justify-around z-50">
        <button onclick="alert('顯示行程')" class="font-black text-[#FF6B00]">行程</button>
        <button onclick="openCalc()" class="font-black">記帳</button>
        <button onclick="alert('顯示行李清單')" class="font-black">清單</button>
    </nav>

    <script>
        function calculateRate() {
            const jpy = prompt("請輸入日幣金額 (JPY):", "1000");
            if (jpy) {
                const twd = Math.round(jpy * 0.21);
                alert("日幣 ¥" + jpy + " 約等於 台幣 $" + twd);
            }
        }
        function openCalc() {
            alert("匯率計算機開啟中...目前匯率 0.21");
        }
    </script>
</body>
</html>
